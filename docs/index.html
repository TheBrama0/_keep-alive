<script>
  async function loadStatus() {
    const container = document.getElementById('projects');
    try {
      const response = await fetch('data/status.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const projects = await response.json();  // array of {project, last_ping, uptime_days}
      
      if (projects.length === 0) {
        container.innerHTML = '<p>No data yet.</p>';
        return;
      }
      
      let html = '';
      projects.forEach(p => {
        const lastPing = new Date(p.last_ping).toLocaleString();
        html += `
          <div class="project">
            <h2>${p.project}</h2>
            <p class="ok">✅ Active</p>
            <p>Last ping: <span class="time">${lastPing}</span></p>
            <p>Uptime days: ${p.uptime_days}</p>
          </div>
        `;
      });
      container.innerHTML = html;
    } catch (err) {
      console.error('Failed to load status:', err);
      container.innerHTML = '<p style="color:red;">❌ Unable to load status.</p>';
    }
  }
  loadStatus();
  // Optional refresh: setInterval(loadStatus, 60000);
</script>
