<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Keep‑Alive Status</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #333; }
        .project { 
            background: white; 
            border: 1px solid #ddd; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .ok { color: #2e7d32; font-weight: bold; }
        .time { font-family: monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
        .error { color: #c62828; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>🚀 Supabase Keep‑Alive Dashboard</h1>
    <div id="projects" class="loading">Loading status...</div>

    <script>
        async function loadStatus() {
            const container = document.getElementById('projects');
            try {
                const response = await fetch('data/status.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const projects = await response.json();  // array of {project, last_ping, uptime_days}
                
                if (!projects || projects.length === 0) {
                    container.innerHTML = '<p class="error">No project data available.</p>';
                    return;
                }
                
                let html = '';
                projects.forEach(p => {
                    const lastPing = new Date(p.last_ping).toLocaleString();
                    html += `
                        <div class="project">
                            <h2>${p.project}</h2>
                            <p class="ok">✅ Active</p>
                            <p>Last ping: <span class="time">${lastPing}</span></p>
                            <p>Uptime days: ${p.uptime_days}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error('Failed to load status:', err);
                container.innerHTML = '<p class="error">❌ Unable to load status. Please check back later.</p>';
            }
        }

        loadStatus();
        // Optional: refresh every minute
        // setInterval(loadStatus, 60000);
    </script>
</body>
</html>
