<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Keep‑Alive Status</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .project { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .ok { color: green; }
        .time { font-family: monospace; }
    </style>
</head>
<body>
    <h1>Supabase Keep‑Alive Dashboard</h1>
    <div id="projects">Loading...</div>

    <script>
        async function loadStatus() {
            const container = document.getElementById('projects');
            try {
                // Fetch the JSON file generated by GitHub Actions
                const response = await fetch('data/status.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();  // data is an array (one row per project)

                // If your JSON contains multiple projects, this loops through them.
                // For a single project, we just take the first element.
                const htmlParts = [];
                for (const row of data) {
                    // You can add a project name here – if your JSON doesn't have a name,
                    // you can hardcode it or enhance the workflow to include it.
                    // For now, we'll use a generic "Project" label.
                    const projectName = "Track2Link"; // or row.name if you add it later
                    const lastPing = new Date(row.last_ping).toLocaleString();
                    htmlParts.push(`
                        <div class="project">
                            <h2>${projectName}</h2>
                            <p class="ok">✅ Active</p>
                            <p>Last ping: <span class="time">${lastPing}</span></p>
                            <p>Uptime days: ${row.uptime_days}</p>
                        </div>
                    `);
                }
                container.innerHTML = htmlParts.join('');
            } catch (err) {
                console.error('Failed to load status:', err);
                container.innerHTML = '<p style="color:red;">❌ Unable to load status. Please check back later.</p>';
            }
        }

        loadStatus();
        // Optional: refresh every minute (if you want near real‑time updates)
        // setInterval(loadStatus, 60000);
    </script>
</body>
</html>
