name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 9:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: Track2Link
            ref: clfndnqtihioqheubzmx   # <-- your project ID (from Supabase URL)
            secret_name: TRACK2LINK_ANON_KEY
    steps:
      - name: Ping ${{ matrix.project.name }}
        run: |
          curl -X POST 'https://${{ matrix.project.ref }}.supabase.co/rest/v1/rpc/ping_keep_alive' \
               -H 'apikey: ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Authorization: Bearer ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Content-Type: application/json' \
               -d '{}'
