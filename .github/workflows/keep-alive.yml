name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 9 * * *'   # Runs daily at 9:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: project-alpha
            ref: clfndnqtihioqheubzmx   # <-- REPLACE with your actual project ref
            secret_name: PROJECT_ALPHA_ANON_KEY
          - name: project-beta
            ref: nopqrstuvwxyz           # <-- REPLACE with your second project ref
            secret_name: PROJECT_BETA_ANON_KEY
          # Add more projects as needed
    steps:
      - name: Call ping_keep_alive for ${{ matrix.project.name }}
        run: |
          curl -X POST 'https://${{ matrix.project.ref }}.supabase.co/rest/v1/rpc/ping_keep_alive' \
               -H 'apikey: ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Authorization: Bearer ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Content-Type: application/json' \
               -d '{}'
