name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: Track2Link v1
            ref: TRACK2LINK_PROJECT_URL_v1
            secret_name: TRACK2LINK_ANON_KEY_v1

          - name: Track2Link v1.1
            ref: TRACK2LINK_PROJECT_URL_v1_1
            secret_name: TRACK2LINK_ANON_KEY_v1_1
            
    steps:
      - name: Ping ${{ matrix.project.name }}
        run: |
          curl -X POST 'https://${{ matrix.project.ref }}.supabase.co/rest/v1/rpc/ping_keep_alive' \
               -H 'apikey: ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Authorization: Bearer ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Content-Type: application/json' \
               -d '{}'

      # After pinging, fetch the updated data and save as JSON
      - name: Fetch status and save to JSON
        run: |
          curl -s -X GET 'https://${{ matrix.project.ref }}.supabase.co/rest/v1/keep_alive?select=last_ping,uptime_days' \
               -H 'apikey: ${{ secrets[matrix.project.secret_name] }}' \
               -H 'Authorization: Bearer ${{ secrets[matrix.project.secret_name] }}' \
               | jq '.' > status.json

      # Upload the JSON as an artifact (optional, but we'll commit it)
      - name: Commit status.json to the repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git commit -m "Update status.json [skip ci]" || exit 0   # skip if no changes
          git push
