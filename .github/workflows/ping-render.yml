name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -I -s -o /dev/null -w "%{http_code}\n" "track2link.onrender.com:10000/status/keepalive/health"
